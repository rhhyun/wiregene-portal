version: "3.3"

services:
  portal:
    image: node:24-bookworm-slim
    container_name: ${CONTAINER_NAME:-wiregene-portal}
    restart: unless-stopped
    working_dir: /app
    ports:
      - "${HOST_PORT:-3002}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOME: /tmp
      npm_config_cache: /tmp/.npm
      WIREGENE_APP_MODE: portal
      PORT: "3000"
      REPORT_STORAGE_BACKEND: ${REPORT_STORAGE_BACKEND:-local-json}
      REPORT_STORAGE_LOCAL_PATH: ${REPORT_STORAGE_LOCAL_PATH:-.data/portal/research-briefing-storage.json}
      PORTAL_ACCOUNT_STORAGE_PATH: ${PORTAL_ACCOUNT_STORAGE_PATH:-.data/portal/portal-accounts.json}
    volumes:
      - ${APP_SOURCE_DIR:-/volume1/docker/wiregene-portal}:/app
      - ./data:/app/.data/portal
      - ./logs:/app/.logs/portal
    command:
      - sh
      - -lc
      - >
        set -eu;
        node -v;
        npm -v;
        export NPM_CONFIG_PRODUCTION=false npm_config_production=false;
        if [ -f package-lock.json ]; then npm ci --include=dev; else npm install --include=dev; fi;
        rm -rf .next;
        npm run build;
        npm run start -- --hostname 0.0.0.0 --port 3000
